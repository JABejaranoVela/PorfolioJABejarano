name: Deploy portfolio to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portfolio-production
  cancel-in-progress: false

env:
  DEPLOY_BASE: /var/www/PorfolioJABejarano

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Prepare release metadata
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_TIMESTAMP="$(date -u +'%Y%m%d_%H%M%S')"
          DEPLOYED_AT="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          RELEASE_ID="${RELEASE_TIMESTAMP}_${GITHUB_SHA:0:7}"
          ARCHIVE_NAME="portfolio_${RELEASE_ID}.tar.gz"

          test -f dist/index.html
          printf '{"release":"%s","sha":"%s","deployed_at":"%s"}\n' \
            "$RELEASE_ID" "$GITHUB_SHA" "$DEPLOYED_AT" > dist/release.json
          test -s dist/release.json

          echo "RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Package release
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "$ARCHIVE_NAME" dist
          sha256sum "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256"

      - name: Configure SSH
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_key
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/vps_key ~/.ssh/known_hosts
          test -s ~/.ssh/vps_key
          test -s ~/.ssh/known_hosts

      - name: Upload release
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          scp -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/vps_key \
            "$ARCHIVE_NAME" "$ARCHIVE_NAME.sha256" \
            "$VPS_USER@$VPS_HOST:/tmp/"

      - name: Activate release
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o IdentitiesOnly=yes -i ~/.ssh/vps_key \
            "$VPS_USER@$VPS_HOST" \
            "bash -s -- '$DEPLOY_BASE' '$RELEASE_ID' '$ARCHIVE_NAME' '$GITHUB_SHA'" <<'REMOTE'
          set -euo pipefail

          BASE_DIR="$1"
          RELEASE_ID="$2"
          ARCHIVE_NAME="$3"
          EXPECTED_SHA="$4"
          RELEASES_DIR="$BASE_DIR/releases"
          RELEASE_DIR="$RELEASES_DIR/$RELEASE_ID"
          ARCHIVE_PATH="/tmp/$ARCHIVE_NAME"
          CHECKSUM_PATH="$ARCHIVE_PATH.sha256"
          PREVIOUS=""

          cleanup_upload() {
            rm -f -- "$ARCHIVE_PATH" "$CHECKSUM_PATH"
          }

          restore_previous() {
            if [ -n "$PREVIOUS" ] && [ -d "$PREVIOUS" ]; then
              ln -sfn "$PREVIOUS" "$BASE_DIR/current.next"
              mv -Tf "$BASE_DIR/current.next" "$BASE_DIR/current"
            else
              rm -f -- "$BASE_DIR/current"
            fi
          }

          trap cleanup_upload EXIT

          mkdir -p "$RELEASES_DIR"
          cd /tmp
          sha256sum -c "$ARCHIVE_NAME.sha256"

          test ! -e "$RELEASE_DIR"
          mkdir "$RELEASE_DIR"
          tar -xzf "$ARCHIVE_PATH" -C "$RELEASE_DIR"
          chmod -R u=rwX,go=rX "$RELEASE_DIR"

          test -f "$RELEASE_DIR/dist/index.html"
          test -s "$RELEASE_DIR/dist/release.json"
          grep -Fq "\"release\":\"$RELEASE_ID\"" "$RELEASE_DIR/dist/release.json"
          grep -Fq "\"sha\":\"$EXPECTED_SHA\"" "$RELEASE_DIR/dist/release.json"

          if [ -L "$BASE_DIR/current" ]; then
            PREVIOUS="$(readlink -f "$BASE_DIR/current")"
          fi

          ln -sfn "$RELEASE_DIR" "$BASE_DIR/current.next"
          mv -Tf "$BASE_DIR/current.next" "$BASE_DIR/current"

          test "$(readlink -f "$BASE_DIR/current")" = "$RELEASE_DIR"
          test -f "$BASE_DIR/current/dist/index.html"

          if ! curl --fail --silent --show-error --location --head \
            --retry 5 --retry-delay 2 https://jabejarano.tech; then
            restore_previous
            exit 1
          fi

          if ! PUBLISHED_RELEASE="$(curl --fail --silent --show-error --location \
            --retry 5 --retry-delay 2 \
            "https://jabejarano.tech/release.json?release=$RELEASE_ID")"; then
            restore_previous
            exit 1
          fi

          if ! printf '%s' "$PUBLISHED_RELEASE" | grep -Fq "\"release\":\"$RELEASE_ID\""; then
            restore_previous
            exit 1
          fi

          if ! printf '%s' "$PUBLISHED_RELEASE" | grep -Fq "\"sha\":\"$EXPECTED_SHA\""; then
            restore_previous
            exit 1
          fi

          CURRENT_TARGET="$(readlink -f "$BASE_DIR/current")"
          find "$RELEASES_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
            | sort -nr \
            | tail -n +6 \
            | cut -d' ' -f2- \
            | while IFS= read -r OLD_RELEASE; do
                if [ -n "$OLD_RELEASE" ] && [ "$OLD_RELEASE" != "$CURRENT_TARGET" ]; then
                  rm -rf -- "$OLD_RELEASE"
                fi
              done
          REMOTE
